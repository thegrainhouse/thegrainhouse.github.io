<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subscription Confirmed</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: - 'Poppins', sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .page {
    text-align: center;
    padding: 3rem 2rem;
    padding-top: 5rem
    max-width: 700px;
    width: 100%;
    z-index: 1;
  }

/* NAVBAR */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 70px;
  background: #000; /* black */
  display: flex;
  align-items: center;
  padding: 0 25px;
  z-index: 1000;
  border-bottom: 1px solid #222;
}

.home-link {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: #fff; /* white text */
  font-weight: 600;
  font-size: 18px;
}

.home-link svg {
  width: 24px;
  height: 24px;
}

.home-link svg path {
  stroke: #fff; /* white icon */
}

  .checkmark {
    width: clamp(56px, 14vw, 72px);
    height: clamp(56px, 14vw, 72px);

    border-radius: 50%;
    background: #f0faf4;
    border: 2px solid #34c768;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.75rem;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  .checkmark svg {
    width: clamp(22px, 6vw, 32px);
    height: clamp(22px, 6vw, 32px);
    stroke: #34c768;
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    animation: drawCheck 0.4s 0.4s ease forwards;
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  @keyframes drawCheck {
    to { stroke-dashoffset: 0; }
  }

  h1 {
    font-size: clamp(1.4rem, 5vw, 2.8rem);
   
    font-weight: 800;
    color: #111;
    line-height: 1.2;
    margin-bottom: 1.1rem;
    animation: fadeUp 0.5s 0.3s ease both;
  }

  p {
    font-size: clamp(14px, 3.5vw, 18px);
    color: #363737;
    line-height: 1.75;
    animation: fadeUp 0.5s 0.45s ease both;
  }

  .illustration {
    margin: 2.25rem auto 0;
    width: 160px;
    animation: fadeUp 0.5s 0.6s ease both;
  }

  .illustration svg {
    width: 100%;
    height: auto;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* Small phones */
  @media (max-width: 380px) {
    .page { padding: 4.5rem 1rem 2rem; }
    h1 { font-size: 1.3rem; }
    p  { font-size: 13px; }
  }
</style>


</head>
<body>
 <!--NAVBAR-->
<header class="top-nav">
  <a href="/" class="home-link">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M3 10.5L12 3l9 7.5" stroke-width="2" stroke-linecap="round"/>
      <path d="M5 10v9h14v-9" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span>Home</span>
  </a>
</header>

<canvas id="confetti-canvas"></canvas>

<div class="page">
  <div class="checkmark">
    <svg viewBox="0 0 24 24"><polyline points="4 13 9 18 20 7"/></svg>
  </div>

  <h1>You're One Step Closer<br>to Better Mornings</h1>

  <p>
    We've received your subscription request. Our team will review your
    location and confirm availability, then reach out shortly to get you
    started.
  </p>

  

</div>

<script>
(function() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const colors = ['#e63946','#f4a261','#2a9d8f','#457b9d','#e9c46a','#264653','#a8dadc','#f1faee'];
  const pieces = [];
  const count = 160;

  for (let i = 0; i < count; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height * 0.5,
      w: 8 + Math.random() * 8,
      h: 5 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.12,
      speedY: 2 + Math.random() * 3.5,
      speedX: (Math.random() - 0.5) * 2,
      opacity: 1
    });
  }

  let frame = 0;
  const maxFrames = 280;

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;

    pieces.forEach(p => {
      p.y += p.speedY;
      p.x += p.speedX;
      p.rot += p.rotSpeed;
      if (frame > maxFrames * 0.6) p.opacity = Math.max(0, p.opacity - 0.012);

      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });

    if (frame < maxFrames) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  draw();
})();
</script>

</body>
</html>
